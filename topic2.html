    <h2>Key Notes</h2>
    <ul>
      <li>Ionic bonding: transfer of electrons between metals and non-metals.</li>
      <li>Covalent bonding: sharing of electrons between non-metals.</li>
      <li>Metallic bonding: sea of delocalised electrons in metals.</li>
